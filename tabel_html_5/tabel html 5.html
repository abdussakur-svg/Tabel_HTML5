<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tabel HTML5</title>
    <style>
        table {
            border-collapse: collapse;
            width: 60%;
            margin: 20px auto;
            font-family: Arial, sans-serif;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        caption {
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<table>
    <caption>Data Siswa</caption>
    <thead>
        <tr>
            <th>No</th>
            <th>Nama</th>
            <th>Kelas</th>
            <th>Nilai</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>1</td>
            <td>Andi</td>
            <td>X IPA 1</td>
            <td>88</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Siti</td>
            <td>X IPA 2</td>
            <td>92</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Budi</td>
            <td>X IPS 1</td>
            <td>85</td>
        </tr>
    </tbody>
</table>

</body>
</html>
